<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#14708E" />
    <title>Kodex - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 400px; }
      .logo { width: 100px; height: auto; margin: 0 auto 2rem; opacity: 0.6; }
      .icon {
        width: 80px; height: 80px;
        margin: 0 auto 1.5rem;
        border-radius: 1rem;
        background: rgba(20, 112, 142, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg { width: 40px; height: 40px; color: #14708E; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
      p { color: rgba(255, 255, 255, 0.4); font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
      button {
        background: #14708E;
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      button:hover { opacity: 0.9; }
      .status { color: rgba(255,255,255,0.15); font-size: 0.75rem; margin-top: 2rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/icons/icon-192x192.png" alt="Kodex" class="logo" />
      <div class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
      <p class="status">Kodex PWA</p>
    </div>
  </body>
</html>
